apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lumen-cxr-hpa
  namespace: lumen-cxr
  labels:
    app.kubernetes.io/name: lumen-cxr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lumen-cxr-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumen-cxr-ingress
  namespace: lumen-cxr
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - lumen-cxr.hospital.org
      secretName: lumen-cxr-tls
  rules:
    - host: lumen-cxr.hospital.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumen-cxr-service
                port:
                  number: 80
